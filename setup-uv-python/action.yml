name: 'Setup uv-managed Python'
description: 'Install uv, install/select Python, and emit setup timing debug summary.'

inputs:
  python-version:
    description: 'Python version to install.'
    required: true
  summary-label:
    description: 'Optional label used in GitHub step summary output. If empty, defaults to python-<python-version>.'
    required: false
    default: ''
  uv-version:
    description: 'uv version to install.'
    required: false
    default: '0.10.4'
  enable-cache:
    description: 'Whether to enable uv cache uploads/restores.'
    required: false
    default: 'true'
  cache-python:
    description: 'Whether to cache uv-managed Python installations.'
    required: false
    default: 'true'
  cache-dependency-glob:
    description: 'Dependency files used to compute the setup-uv cache key. If empty, setup-uv determines the glob.'
    required: false
    default: ''
  cache-suffix:
    description: 'Optional suffix appended to setup-uv cache keys for cache busting/debugging.'
    required: false
    default: ''

outputs:
  python-bin:
    description: 'Selected Python interpreter path.'
    value: ${{ steps.select_python.outputs.python_bin }}

runs:
  using: 'composite'
  steps:
    - name: Mark Python setup start
      if: ${{ env.CI_UV_DEBUG == 'true' }}
      id: mark_python_setup_start
      shell: bash
      run: printf 'py_setup_t0=%s\n' "$(date +%s)" >> "$GITHUB_OUTPUT"

    - name: Install uv and set Python ${{ inputs.python-version }} (custom cache glob)
      if: ${{ inputs.cache-dependency-glob != '' }}
      id: setup_uv_with_glob
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
      with:
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.enable-cache }}
        cache-python: ${{ inputs.cache-python }}
        cache-dependency-glob: ${{ inputs.cache-dependency-glob }}
        cache-suffix: ${{ inputs.cache-suffix }}

    # Identical to the previous step, except the cache-dependency-glob input is omitted.
    # Required as there is no way to omit just the cache-dependency-glob input.
    - name: Install uv and set Python ${{ inputs.python-version }} (implicit cache glob)
      if: ${{ inputs.cache-dependency-glob == '' }}
      id: setup_uv_default_glob
      uses: astral-sh/setup-uv@eac588ad8def6316056a12d4907a9d4d84ff7a3b  # v7.3.0
      with:
        version: ${{ inputs.uv-version }}
        python-version: ${{ inputs.python-version }}
        enable-cache: ${{ inputs.enable-cache }}
        cache-python: ${{ inputs.cache-python }}
        cache-suffix: ${{ inputs.cache-suffix }}

    - name: Create and select uv virtual environment
      id: select_python
      shell: bash
      env:
        UV_PYTHON_VERSION: ${{ inputs.python-version }}
      run: | # zizmor: ignore[github-env] This step intentionally exports validated venv paths for downstream steps.

        # A safety check used to protect against injecting potential
        # unrelated additional variables.
        ensure_single_line() {
          local var_name="$1"
          local var_value="$2"
          case "$var_value" in
            *$'\n'*|*$'\r'*)
              echo "::error::$var_name contains a newline; refusing to write to GitHub environment files."
              exit 1
              ;;
          esac
        }

        # setup-uv already handles Python install/restore. Simply re-installing here can
        # fail on Windows when cached reparse points already exist.
        if ! MANAGED_PYTHON_BIN="$(uv python find "$UV_PYTHON_VERSION" 2>/dev/null)"; then
          uv python install "$UV_PYTHON_VERSION"
          MANAGED_PYTHON_BIN="$(uv python find "$UV_PYTHON_VERSION")"
        fi

        VENV_PATH="${RUNNER_TEMP:-/tmp}/uv-ci-venv"
        uv venv --clear --python "$MANAGED_PYTHON_BIN" "$VENV_PATH"
        if [ -x "$VENV_PATH/bin/python" ]; then
          PYTHON_BIN="$VENV_PATH/bin/python"
        elif [ -x "$VENV_PATH/Scripts/python.exe" ]; then
          PYTHON_BIN="$VENV_PATH/Scripts/python.exe"
        else
          echo "::error::Could not find Python executable in $VENV_PATH"
          exit 1
        fi

        # Ensure both python and python3 are available in PATH.
        PYTHON_DIR="$(dirname "$PYTHON_BIN")"
        if [ "${RUNNER_OS:-}" = "Windows" ]; then
          if [ ! -e "$PYTHON_DIR/python3.exe" ] && [ -e "$PYTHON_DIR/python.exe" ]; then
            cp "$PYTHON_DIR/python.exe" "$PYTHON_DIR/python3.exe"
          fi
        else
          if [ ! -e "$PYTHON_DIR/python" ] && [ -x "$PYTHON_DIR/python3" ]; then
            ln -s python3 "$PYTHON_DIR/python"
          fi
          if [ ! -e "$PYTHON_DIR/python3" ] && [ -x "$PYTHON_DIR/python" ]; then
            ln -s python "$PYTHON_DIR/python3"
          fi
        fi

        ensure_single_line 'PYTHON_BIN' "$PYTHON_BIN"
        ensure_single_line 'VIRTUAL_ENV' "$VENV_PATH"
        ensure_single_line 'PYTHON_DIR' "$PYTHON_DIR"
        printf 'python_bin=%s\n' "$PYTHON_BIN" >> "$GITHUB_OUTPUT"
        printf 'PYTHON_BIN=%s\n' "$PYTHON_BIN" >> "$GITHUB_ENV"
        printf 'VIRTUAL_ENV=%s\n' "$VENV_PATH" >> "$GITHUB_ENV"
        printf '%s\n' "$PYTHON_DIR" >> "$GITHUB_PATH"

    - name: Report Python setup duration
      if: ${{ env.CI_UV_DEBUG == 'true' }}
      shell: bash
      env:
        SUMMARY_LABEL: ${{ inputs.summary-label != '' && inputs.summary-label || format('python-{0}', inputs.python-version) }}
        PY_SETUP_T0: ${{ steps.mark_python_setup_start.outputs.py_setup_t0 }}
        UV_CACHE_HIT: ${{ steps.setup_uv_with_glob.outputs.cache-hit || steps.setup_uv_default_glob.outputs.cache-hit }}
        PYTHON_CACHE_HIT: ${{ steps.setup_uv_with_glob.outputs.python-cache-hit || steps.setup_uv_default_glob.outputs.python-cache-hit }}
      run: |
        echo "### ${SUMMARY_LABEL} Python setup" >> "$GITHUB_STEP_SUMMARY"
        echo "- duration: $(( $(date +%s) - PY_SETUP_T0 ))s" >> "$GITHUB_STEP_SUMMARY"
        echo "- uv cache hit: ${UV_CACHE_HIT}" >> "$GITHUB_STEP_SUMMARY"
        echo "- python cache hit: ${PYTHON_CACHE_HIT}" >> "$GITHUB_STEP_SUMMARY"
